services:
  postgres:
    image: postgres:16-alpine
    container_name: af-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentforge_dev}
      POSTGRES_DB: agentforge
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: af-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: af-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://agentforge:${DB_PASSWORD:-agentforge_dev}@postgres:5432/agentforge
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile
    container_name: af-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
